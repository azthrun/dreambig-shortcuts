name: Build, Test and Publish DreamBig.Shortcuts.Results

on:
  push:
    branches:
      - "release/**"
      - "hotfix/**"
    paths:
      - "DreamBig.Shortcuts.Results/**"
      - ".github/workflows/publish-shortcuts-results.yml"
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - "DreamBig.Shortcuts.Results/**"
      - ".github/workflows/publish-shortcuts-results.yml"

permissions:
  contents: write
  packages: read

env:
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: "DreamBig.Shortcuts.Results/src/DreamBig.Shortcuts.Results/DreamBig.Shortcuts.Results.csproj"
  TEST_PROJECT_PATH: "DreamBig.Shortcuts.Results/tests/DreamBig.Shortcuts.Results.Tests/DreamBig.Shortcuts.Results.Tests.csproj"

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.version.outputs.should_publish }}
      is_pr_to_main: ${{ steps.version.outputs.is_pr_to_main }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          echo "Current ref: ${{ github.ref }}"
          echo "Event name: ${{ github.event_name }}"
          
          SHOULD_PUBLISH="false"
          VERSION=""
          IS_PR_TO_MAIN="false"

          # Determine if this is a PR merged to main
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.merged }}" == "true" && "${{ github.event.pull_request.base.ref }}" == "main" ]]; then
            IS_PR_TO_MAIN="true"
            SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
            echo "📋 PR merged to main from branch: $SOURCE_BRANCH"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            SOURCE_BRANCH="${GITHUB_REF#refs/heads/}"
            echo "📋 Push to branch: $SOURCE_BRANCH"
          else
            echo "⚠️ Event not eligible for processing"
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "should_publish=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Helper function to extract version from branch name
          extract_version_from_branch() {
            local branch=$1
            # Extract version pattern (e.g., "1.2.3" from "release/1.2.3")
            if [[ "$branch" =~ (release|hotfix)/([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              echo "${BASH_REMATCH[2]}"
            else
              echo ""
            fi
          }

          # Helper function to get highest beta version for a base version
          get_highest_beta() {
            local base_version=$1
            local tag_pattern="Shortcuts.Results-${base_version}-beta.*"
            local highest_beta=$(git tag -l "$tag_pattern" | sed "s/Shortcuts.Results-${base_version}-beta\.//" | sort -n | tail -n 1)
            echo "${highest_beta:-0}"
          }

          # Helper function to get highest non-beta version
          get_highest_stable_version() {
            local latest_tag=$(git tag -l "Shortcuts.Results-*" | grep -v "beta" | sort -V | tail -n 1)
            if [[ -n "$latest_tag" ]]; then
              echo "${latest_tag#Shortcuts.Results-}"
            else
              echo "0.0.0"
            fi
          }

          # Helper function to increment patch version
          increment_patch() {
            local version=$1
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            echo "${major}.${minor}.${patch}"
          }

          # RULE 1 & 2: Commits to release/** or hotfix/** branches → Beta versions
          if [[ "${{ github.event_name }}" == "push" && ("$SOURCE_BRANCH" =~ ^release/ || "$SOURCE_BRANCH" =~ ^hotfix/) ]]; then
            BASE_VERSION=$(extract_version_from_branch "$SOURCE_BRANCH")
            
            if [[ -n "$BASE_VERSION" ]]; then
              # Valid version in branch name
              HIGHEST_BETA=$(get_highest_beta "$BASE_VERSION")
              NEXT_BETA=$((HIGHEST_BETA + 1))
              VERSION="${BASE_VERSION}-beta.${NEXT_BETA}"
              SHOULD_PUBLISH="true"
              echo "✅ Rule 1/2: Beta version for $SOURCE_BRANCH → $VERSION"
            else
              echo "⚠️ Branch name doesn't contain valid version, skipping publish"
              VERSION="dev"
              SHOULD_PUBLISH="false"
            fi

          # RULE 3, 4, 5: PR merged to main
          elif [[ "$IS_PR_TO_MAIN" == "true" ]]; then
            
            # Check if source branch is release/** or hotfix/**
            if [[ "$SOURCE_BRANCH" =~ ^release/ || "$SOURCE_BRANCH" =~ ^hotfix/ ]]; then
              BASE_VERSION=$(extract_version_from_branch "$SOURCE_BRANCH")
              
              if [[ -n "$BASE_VERSION" ]]; then
                # RULE 3: Valid release/hotfix branch → Use version as-is
                VERSION="$BASE_VERSION"
                SHOULD_PUBLISH="true"
                echo "✅ Rule 3: Stable version from $SOURCE_BRANCH → $VERSION"
              else
                # RULE 4: Invalid release/hotfix branch name → Auto-increment patch
                STABLE_VERSION=$(get_highest_stable_version)
                VERSION=$(increment_patch "$STABLE_VERSION")
                SHOULD_PUBLISH="true"
                echo "✅ Rule 4: Auto-increment from $STABLE_VERSION → $VERSION"
              fi
            else
              # RULE 5: Other branches → Auto-increment patch
              STABLE_VERSION=$(get_highest_stable_version)
              VERSION=$(increment_patch "$STABLE_VERSION")
              SHOULD_PUBLISH="true"
              echo "✅ Rule 5: Auto-increment from $STABLE_VERSION → $VERSION"
            fi

          # RULE 6: All other scenarios → Build & test only
          else
            echo "ℹ️ Rule 6: Build and test only, no publish"
            VERSION="dev"
            SHOULD_PUBLISH="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT
          echo "is_pr_to_main=$IS_PR_TO_MAIN" >> $GITHUB_OUTPUT
          echo ""
          echo "📦 Final version: $VERSION"
          echo "📤 Should publish: $SHOULD_PUBLISH"
          echo "🔀 Is PR to main: $IS_PR_TO_MAIN"

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: determine-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Display .NET information
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build project
        run: |
          # Extract numeric version (e.g., 0.0.1 from 0.0.1-alpha.1)
          NUMERIC_VERSION=$(echo "${{ needs.determine-version.outputs.version }}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1.0/')
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            -p:Version=${{ needs.determine-version.outputs.version }} \
            -p:AssemblyVersion=$NUMERIC_VERSION \
            -p:FileVersion=$NUMERIC_VERSION

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            DreamBig.Shortcuts.Results/src/DreamBig.Shortcuts.Results/bin/Release/
            DreamBig.Shortcuts.Results/src/DreamBig.Shortcuts.Results/obj/Release/
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [determine-version, build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: DreamBig.Shortcuts.Results/src/DreamBig.Shortcuts.Results/

      - name: Restore test project dependencies
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      - name: Build test project
        run: |
          dotnet build ${{ env.TEST_PROJECT_PATH }} \
            --configuration Release \
            --no-restore

      - name: Run tests
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/test-results.trx
            **/coverage.cobertura.xml
          retention-days: 30

  publish:
    name: Create and Publish NuGet Package
    runs-on: ubuntu-latest
    needs: [determine-version, test]
    if: needs.determine-version.outputs.should_publish == 'true'
    environment:
      name: nuget-production
      url: https://www.nuget.org/packages/DreamBig.Shortcuts.Results/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build project for packaging
        run: |
          # Extract numeric version (e.g., 0.0.1 from 0.0.1-alpha.1)
          NUMERIC_VERSION=$(echo "${{ needs.determine-version.outputs.version }}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1.0/')
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            -p:Version=${{ needs.determine-version.outputs.version }} \
            -p:AssemblyVersion=$NUMERIC_VERSION \
            -p:FileVersion=$NUMERIC_VERSION

      - name: Create NuGet package
        run: |
          mkdir -p ${{ github.workspace }}/packages
          dotnet pack ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --output ${{ github.workspace }}/packages \
            -p:Version=${{ needs.determine-version.outputs.version }} \
            -p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Display package information
        run: |
          echo "### Package Created Successfully 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.determine-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files:**" >> $GITHUB_STEP_SUMMARY
          ls -lh ${{ github.workspace }}/packages | tail -n +2 | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "${{ github.workspace }}/packages/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload NuGet package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ github.workspace }}/packages/*.nupkg
          retention-days: 30

      # RULE 7: Create Git tag after successful NuGet publication
      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TAG_NAME="Shortcuts.Results-${{ needs.determine-version.outputs.version }}"
          
          # Check if tag already exists
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "⚠️ Tag $TAG_NAME already exists, skipping tag creation"
          else
            git tag -a "$TAG_NAME" -m "Release version ${{ needs.determine-version.outputs.version }}"
            git push origin "$TAG_NAME"
            echo "✅ Created and pushed tag: $TAG_NAME"
          fi

      # RULE 7a: Create GitHub Release only for PR merges to main
      - name: Create GitHub Release
        if: needs.determine-version.outputs.is_pr_to_main == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="Shortcuts.Results-${{ needs.determine-version.outputs.version }}"
          VERSION="${{ needs.determine-version.outputs.version }}"
          
          # Upload package files and create release with auto-generated notes
          gh release create "$TAG_NAME" \
            --title "$VERSION" \
            --target "${{ github.sha }}" \
            --generate-notes \
            ${{ github.workspace }}/packages/*.nupkg
          
          echo "✅ Created GitHub Release: $VERSION"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [determine-version, build, test, publish]
    if: always()

    steps:
      - name: Generate workflow summary
        run: |
          echo "# Workflow Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch/Tag:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test:** ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.determine-version.outputs.should_publish }}" == "true" ]]; then
            echo "- **Publish:** ${{ needs.publish.result }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Package Information" >> $GITHUB_STEP_SUMMARY
            echo "- **Version:** ${{ needs.determine-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            
            if [[ "${{ needs.publish.result }}" == "success" ]]; then
              echo "- **Published to NuGet.org:** ✅" >> $GITHUB_STEP_SUMMARY
              echo "- **Package URL:** https://www.nuget.org/packages/DreamBig.Shortcuts.Results/${{ needs.determine-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **Published to NuGet.org:** ❌" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note:** This is a development build. No package was published." >> $GITHUB_STEP_SUMMARY
          fi
