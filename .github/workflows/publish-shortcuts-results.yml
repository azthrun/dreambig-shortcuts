name: Build, Test and Publish DreamBig.Shortcuts.Results

on:
  push:
    branches:
      - main
      - release
    tags:
      - 'Shortcuts.Results-*'

permissions:
  contents: write
  packages: read

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'DreamBig.Shortcuts.Results/src/DreamBig.Shortcuts.Results/DreamBig.Shortcuts.Results.csproj'
  TEST_PROJECT_PATH: 'DreamBig.Shortcuts.Results/tests/DreamBig.Shortcuts.Results.Tests/DreamBig.Shortcuts.Results.Tests.csproj'

jobs:
  extract-version:
    name: Extract Version from Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_tagged: ${{ steps.extract.outputs.is_tagged }}
    
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          if [[ "${{ github.ref }}" == refs/tags/Shortcuts.Results-* ]]; then
            VERSION="${GITHUB_REF#refs/tags/Shortcuts.Results-}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_tagged=true" >> $GITHUB_OUTPUT
            echo "Extracted version: $VERSION"
          else
            echo "is_tagged=false" >> $GITHUB_OUTPUT
            echo "Not a tagged release, skipping version extraction"
          fi

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: extract-version
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Display .NET information
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build project
        run: |
          if [[ "${{ needs.extract-version.outputs.is_tagged }}" == "true" ]]; then
            # Extract numeric version (e.g., 0.0.1 from 0.0.1-alpha.1)
            NUMERIC_VERSION=$(echo "${{ needs.extract-version.outputs.version }}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1.0/')
            dotnet build ${{ env.PROJECT_PATH }} \
              --configuration Release \
              --no-restore \
              -p:Version=${{ needs.extract-version.outputs.version }} \
              -p:AssemblyVersion=$NUMERIC_VERSION \
              -p:FileVersion=$NUMERIC_VERSION
          else
            dotnet build ${{ env.PROJECT_PATH }} \
              --configuration Release \
              --no-restore
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            DreamBig.Shortcuts.Results/src/DreamBig.Shortcuts.Results/bin/Release/
            DreamBig.Shortcuts.Results/src/DreamBig.Shortcuts.Results/obj/Release/
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [extract-version, build]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: DreamBig.Shortcuts.Results/src/DreamBig.Shortcuts.Results/

      - name: Restore test project dependencies
        run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

      - name: Build test project
        run: |
          dotnet build ${{ env.TEST_PROJECT_PATH }} \
            --configuration Release \
            --no-restore

      - name: Run tests
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/test-results.trx
            **/coverage.cobertura.xml
          retention-days: 30

  publish:
    name: Create and Publish NuGet Package
    runs-on: ubuntu-latest
    needs: [extract-version, test]
    if: needs.extract-version.outputs.is_tagged == 'true'
    environment:
      name: nuget-production
      url: https://www.nuget.org/packages/DreamBig.Shortcuts.Results/
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build project for packaging
        run: |
          # Extract numeric version (e.g., 0.0.1 from 0.0.1-alpha.1)
          NUMERIC_VERSION=$(echo "${{ needs.extract-version.outputs.version }}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1.0/')
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            -p:Version=${{ needs.extract-version.outputs.version }} \
            -p:AssemblyVersion=$NUMERIC_VERSION \
            -p:FileVersion=$NUMERIC_VERSION

      - name: Create NuGet package
        run: |
          mkdir -p ${{ github.workspace }}/packages
          dotnet pack ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --output ${{ github.workspace }}/packages \
            -p:Version=${{ needs.extract-version.outputs.version }} \
            -p:PackageVersion=${{ needs.extract-version.outputs.version }}

      - name: Display package information
        run: |
          echo "### Package Created Successfully 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.extract-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files:**" >> $GITHUB_STEP_SUMMARY
          ls -lh ${{ github.workspace }}/packages | tail -n +2 | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "${{ github.workspace }}/packages/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload NuGet package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ github.workspace }}/packages/*.nupkg
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ github.workspace }}/packages/*.nupkg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.extract-version.outputs.version, 'beta') || contains(needs.extract-version.outputs.version, 'alpha') || contains(needs.extract-version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [extract-version, build, test, publish]
    if: always()
    
    steps:
      - name: Generate workflow summary
        run: |
          echo "# Workflow Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch/Tag:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test:** ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.extract-version.outputs.is_tagged }}" == "true" ]]; then
            echo "- **Publish:** ${{ needs.publish.result }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Package Information" >> $GITHUB_STEP_SUMMARY
            echo "- **Version:** ${{ needs.extract-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            
            if [[ "${{ needs.publish.result }}" == "success" ]]; then
              echo "- **Published to NuGet.org:** ✅" >> $GITHUB_STEP_SUMMARY
              echo "- **Package URL:** https://www.nuget.org/packages/DreamBig.Shortcuts.Results/${{ needs.extract-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **Published to NuGet.org:** ❌" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note:** This is a branch push. No package was published." >> $GITHUB_STEP_SUMMARY
          fi

